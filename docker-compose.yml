name: claude-code-sandbox

# No named volumes: everything is a bind mount so it survives `docker system prune --volumes`.
services:
  claude-code:
    build:
      context: .
      args:
        TZ: "Asia/Tokyo"
        CLAUDE_CODE_VERSION: latest
        USER_UID: "1000"
        USER_GID: "1000"
    image: jqtype/claude-code-sandbox
    container_name: claude-code
    restart: unless-stopped
    # Let watchtower manage this container, but never kill an active session.
    # The pre-update hook runs inside the container before an update and returns
    # exit code 75 (EX_TEMPFAIL) while a Claude Code process is running, which
    # tells watchtower to postpone the update until the next poll. When no Claude
    # session is running it returns 0 and watchtower recreates the container with
    # the new image. See wt-preupdate.sh.
    #
    # This requires lifecycle hooks to be enabled on the *watchtower* service
    # (not here): WATCHTOWER_LIFECYCLE_HOOKS=true, or flag --enable-lifecycle-hooks.
    labels:
      - "com.centurylinklabs.watchtower.lifecycle.pre-update=/usr/local/bin/wt-preupdate"
      - "com.centurylinklabs.watchtower.lifecycle.pre-update-timeout=1"
    # No `network` key: a dedicated default network is created, isolating this
    # service from others.
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      NODE_OPTIONS: "--max-old-space-size=4096"
      CLAUDE_CONFIG_DIR: /home/dev/.claude
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      # All bind mounts: not affected by `docker system prune --volumes` (outside
      # Docker's management). The docker socket is intentionally never mounted.
      - ./cc-workspace:/workspace:delegated
      - ./data/claude:/home/dev/.claude
      - ./data/history:/commandhistory
    entrypoint: ["/bin/sh", "-c", "sudo /usr/local/bin/init-firewall.sh && sleep infinity"]
